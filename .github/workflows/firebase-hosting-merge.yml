name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NEXT_PUBLIC_BACKEND_URL: https://navi-raksha-backend.onrender.com
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Dependencies
        run: |
          cd web
          npm install
      - name: Build
        run: |
          cd web
          npx next build
      - name: Diagnostic - List Build Output
        run: |
          echo "Checking web/out directory:"
          ls -R web/out || echo "web/out NOT FOUND"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NAVI_RAKSHA }}'
          channelId: live
          projectId: navi-raksha
